<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <h2>LO</h2>
        </div>
        <nav>
            <ul>
                <div class="home"><li><a href="index.html">Home</a></li></div>
                <div class="mycourses"><li><a href="courses.html">My Courses</a></li></div>
                <div class="addcourse"><li><a href="add_course.html">Add Course</a></li></div>
                <div class="contactus"><li><a href="Contact_Us.html">Contact Us</a></li></div>
            </ul>
        </nav>
    </header>
<main>
    <div class="cont">Contact Us</div>
    <section class="contact-container">
        
        <div class="contact-info">
            <ul class="contact-list">
                <li><strong>Email:</strong> support@courseorganizer.com</li>
                <li><strong>Address:</strong> Helwan, Cairo, Egypt</li>
                <li><strong>Phone:</strong> +20 123 456 7890</li>
            </ul>
        </div>

        <form class="contact-form">
            <div class="form-group">
                <label for="user-name">Your Name:</label>
                <input type="text" id="user-name" name="user-name" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label for="user-email">Your Email:</label>
                <input type="email" id="user-email" name="user-email" placeholder="example@mail.com" required>
            </div>

            <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" placeholder="How can we help you?"></textarea>
            </div>

            <button type="submit" class="btn-send">Send Message</button>
        </form>
    </section>
</main>
